name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: unzip "JarvisApp-V4-FIXED.zip" -d extracted
      - name: Build APK
        run: |
          cd extracted/JarvisV4
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: jarvis-apk
          path: extracted/JarvisV4/app
